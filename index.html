<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-STUDIO | Smart Queue Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #020203; color: #e2e8f0; overflow: hidden; }
        
        .glass { background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .queue-card { border-left: 4px solid #6366f1; background: rgba(99, 102, 241, 0.05); }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        @keyframes scanning {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #6366f1, transparent);
            animation: scanning 2s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [input, setInput] = useState('');
            const [queue, setQueue] = useState([]);
            const [logs, setLogs] = useState(["Sistem antrean aktif.", "Siap menerima instruksi..."]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [apiKey, setApiKey] = useState("AIzaSyBIJhS4rNFouHuXZlhdkGuYkMvIsq_3hsk");

            const addLog = (msg) => setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev].slice(0, 15));

            // LOGIKA UTAMA: Proses Antrean
            useEffect(() => {
                if (!isProcessing && queue.length > 0) {
                    const pendingItem = queue.find(item => item.status === 'Antre' || item.status === 'Retry');
                    if (pendingItem) {
                        processQueueItem(pendingItem.id);
                    }
                }
            }, [queue, isProcessing]);

            const processQueueItem = async (id) => {
                setIsProcessing(true);
                updateItemStatus(id, 'Memproses...', null);
                
                const item = queue.find(i => i.id === id);
                let retryCount = item.retries || 0;
                const maxRetries = 5;

                const attemptCall = async () => {
                    addLog(`Mencoba generate untuk ID: ${id.substring(0,8)}...`);
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: item.prompt }] }] })
                        });

                        const data = await response.json();

                        if (data.error) {
                            // Jika Limit Habis (Error 429 atau 400 tertentu)
                            if (data.error.code === 429 || data.error.message.includes("limit")) {
                                if (retryCount < maxRetries) {
                                    const delay = Math.pow(2, retryCount) * 2000; // Exponential backoff
                                    addLog(`Limit habis! Menunggu ${delay/1000} detik sebelum mencoba lagi...`);
                                    updateItemStatus(id, 'Menunggu Limit', null, retryCount + 1);
                                    
                                    setTimeout(() => {
                                        setIsProcessing(false); // Trigger useEffect lagi
                                    }, delay);
                                    return;
                                } else {
                                    throw new Error("Gagal setelah beberapa kali percobaan limit.");
                                }
                            }
                            throw new Error(data.error.message);
                        }

                        const textResult = data.candidates[0].content.parts[0].text;
                        updateItemStatus(id, 'Selesai', textResult);
                        addLog(`ID ${id.substring(0,8)} Berhasil!`);
                        setIsProcessing(false);

                    } catch (err) {
                        updateItemStatus(id, 'Error', err.message);
                        addLog(`Kesalahan: ${err.message}`);
                        setIsProcessing(false);
                    }
                };

                await attemptCall();
            };

            const updateItemStatus = (id, status, result, retries = 0) => {
                setQueue(prev => prev.map(item => 
                    item.id === id ? { ...item, status, result, retries } : item
                ));
            };

            const addToQueue = () => {
                if (!input.trim()) return;
                const newItem = {
                    id: crypto.randomUUID(),
                    prompt: input,
                    status: 'Antre',
                    result: null,
                    retries: 0,
                    time: new Date().toLocaleTimeString()
                };
                setQueue(prev => [newItem, ...prev]);
                setInput('');
                addLog("Tugas ditambahkan ke antrean.");
            };

            return (
                <div className="flex h-screen w-full bg-[#020203]">
                    {/* Sidebar: Status & Logs */}
                    <aside className="w-80 glass border-r border-white/5 flex flex-col p-6 z-20">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/20">
                                <Icon name="layers" className="text-white" />
                            </div>
                            <h1 className="text-xl font-black tracking-tighter text-white">V-QUEUE</h1>
                        </div>

                        <div className="flex-1 overflow-hidden flex flex-col">
                            <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Aktivitas Sistem</h3>
                            <div className="flex-1 overflow-y-auto custom-scroll space-y-3 font-mono text-[10px]">
                                {logs.map((log, i) => (
                                    <div key={i} className="text-gray-500 border-l border-white/10 pl-3 py-1">
                                        {log}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="mt-6 p-4 rounded-2xl bg-white/5 border border-white/5">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-[10px] font-bold text-gray-500 uppercase">Status Worker</span>
                                <span className={`text-[10px] font-bold ${isProcessing ? 'text-orange-500' : 'text-green-500'}`}>
                                    {isProcessing ? 'BUSY' : 'READY'}
                                </span>
                            </div>
                            <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                                <div className={`h-full bg-indigo-600 transition-all duration-500 ${isProcessing ? 'w-full animate-pulse' : 'w-0'}`}></div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Work Area */}
                    <main className="flex-1 flex flex-col overflow-hidden relative">
                        <header className="h-20 glass border-b border-white/5 flex items-center justify-between px-10 z-10">
                            <div className="flex items-center gap-4">
                                <div className="px-3 py-1 bg-indigo-600/10 border border-indigo-600/20 rounded-lg">
                                    <span className="text-[10px] font-bold text-indigo-400">QUEUE: {queue.filter(i => i.status !== 'Selesai').length}</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => setApiKey(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-[10px] w-40 outline-none focus:border-indigo-500"
                                    placeholder="API KEY"
                                />
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto custom-scroll p-10 space-y-10">
                            {/* Input Panel */}
                            <section className="max-w-4xl mx-auto">
                                <div className="glass rounded-[32px] p-2">
                                    <div className="bg-[#08080a] rounded-[30px] p-6">
                                        <textarea 
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            placeholder="Masukkan instruksi generate... (Bisa masukkan banyak sekaligus)"
                                            className="w-full bg-transparent border-none focus:ring-0 text-xl h-32 resize-none placeholder-gray-800"
                                        />
                                        <div className="flex justify-end mt-4">
                                            <button 
                                                onClick={addToQueue}
                                                className="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold text-xs uppercase tracking-widest shadow-xl shadow-indigo-600/20 active:scale-95 transition-all"
                                            >
                                                Tambah ke Antrean
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* Queue List */}
                            <section className="max-w-4xl mx-auto space-y-6 pb-20">
                                <h2 className="text-xs font-bold text-gray-500 uppercase tracking-widest px-2">Daftar Antrean & Hasil</h2>
                                {queue.length === 0 && (
                                    <div className="text-center py-20 border-2 border-dashed border-white/5 rounded-[40px]">
                                        <Icon name="inbox" size={48} className="mx-auto text-gray-800 mb-4" />
                                        <p className="text-gray-600 font-bold uppercase text-[10px] tracking-widest">Belum ada antrean</p>
                                    </div>
                                )}
                                {queue.map((item) => (
                                    <div key={item.id} className={`glass rounded-3xl p-6 transition-all border ${item.status === 'Selesai' ? 'border-green-500/20' : 'border-white/5'}`}>
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${
                                                    item.status === 'Selesai' ? 'bg-green-500/10 text-green-500' : 
                                                    item.status === 'Menunggu Limit' ? 'bg-orange-500/10 text-orange-500 animate-pulse' :
                                                    'bg-indigo-500/10 text-indigo-500'
                                                }`}>
                                                    <Icon name={item.status === 'Selesai' ? 'check' : item.status === 'Error' ? 'alert-circle' : 'clock'} size={16} />
                                                </div>
                                                <div>
                                                    <p className="text-[10px] font-bold uppercase tracking-widest text-gray-500">ID: {item.id.substring(0,8)} • {item.time}</p>
                                                    <p className={`text-[10px] font-black uppercase ${
                                                        item.status === 'Selesai' ? 'text-green-500' : 
                                                        item.status === 'Menunggu Limit' ? 'text-orange-500' : 
                                                        'text-indigo-400'
                                                    }`}>{item.status} {item.retries > 0 && `(Retry #${item.retries})`}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => setQueue(q => q.filter(i => i.id !== item.id))} className="text-gray-700 hover:text-red-500 transition-colors">
                                                <Icon name="trash-2" size={16} />
                                            </button>
                                        </div>
                                        <p className="text-sm text-gray-300 font-medium mb-4 italic">"{item.prompt}"</p>
                                        
                                        {item.status === 'Memproses...' && (
                                            <div className="h-24 relative overflow-hidden bg-white/5 rounded-xl flex items-center justify-center">
                                                <div className="scan-line absolute inset-0"></div>
                                                <span className="text-[10px] font-bold text-gray-600 uppercase">Sedang Menganalisis...</span>
                                            </div>
                                        )}

                                        {item.result && (
                                            <div className="bg-black/40 rounded-2xl p-6 text-sm leading-relaxed text-gray-400 border border-white/5 whitespace-pre-wrap max-h-96 overflow-y-auto custom-scroll font-medium">
                                                {item.result}
                                            </div>
                                        )}

                                        {item.status === 'Error' && (
                                            <div className="bg-red-500/5 rounded-2xl p-4 text-xs font-mono text-red-400 border border-red-500/20">
                                                {item.result}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </section>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
