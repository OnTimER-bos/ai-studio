<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-STUDIO | Next-Gen AI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-active { background: linear-gradient(90deg, rgba(79, 70, 229, 0.2) 0%, rgba(79, 70, 229, 0) 100%); border-left: 3px solid #6366f1; color: white; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        .neon-border { position: relative; }
        .neon-border::after { content: ''; position: absolute; inset: -1px; background: linear-gradient(45deg, #6366f1, #a855f7); border-radius: inherit; z-index: -1; opacity: 0.3; }
        textarea::placeholder { color: #444; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(false);
            const [prompt, setPrompt] = useState('');
            const [result, setResult] = useState(null);
            const [selectedEngine, setSelectedEngine] = useState('gemini');

            const apiKeys = {
                gemini: "AIzaSyBIJhS4rNFouHuXZlhdkGuYkMvIsq_3hsk".trim(),
                groq: "gsk_vR8_0BZiQWmk42bQOKH6tHNZEftZLYfpCZA0UMCyG".trim()
            };

            const callGemini = async (text) => {
                // Mencoba v1beta yang paling fleksibel untuk key baru
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKeys.gemini}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }] })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.candidates[0].content.parts[0].text;
            };

            const handleGenerate = async () => {
                if (!prompt.trim()) return;
                setLoading(true);
                setResult(null);
                try {
                    let text = "";
                    if (selectedEngine === 'gemini') {
                        text = await callGemini(prompt);
                    } else {
                        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKeys.groq}` },
                            body: JSON.stringify({ model: "llama3-8b-8192", messages: [{ role: "user", content: prompt }] })
                        });
                        const data = await res.json();
                        text = data.choices[0].message.content;
                    }
                    setResult({ text, isError: false });
                } catch (err) {
                    setResult({ text: err.message, isError: true });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex h-screen w-full bg-[#050505]">
                    {/* Sidebar */}
                    <aside className="w-72 glass border-r border-white/5 flex flex-col p-6 z-20">
                        <div className="flex items-center space-x-3 mb-12">
                            <div className="w-10 h-10 bg-gradient-to-tr from-indigo-600 to-purple-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <LucideIcon name="zap" className="text-white fill-current" />
                            </div>
                            <span className="text-xl font-extrabold tracking-tighter">V-STUDIO <span className="text-indigo-500">PRO</span></span>
                        </div>

                        <nav className="flex-1 space-y-2">
                            <SidebarItem icon="layout-grid" label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <div className="pt-6 pb-2 px-4 text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Kreativitas AI</div>
                            <SidebarItem icon="type" label="AI Writing" active={activeTab === 'text'} onClick={() => setActiveTab('text')} />
                            <SidebarItem icon="image" label="AI Image" active={activeTab === 'image'} onClick={() => setActiveTab('image')} />
                            <SidebarItem icon="video" label="AI Video" active={activeTab === 'video'} onClick={() => setActiveTab('video')} />
                            <SidebarItem icon="music" label="AI Music" active={activeTab === 'music'} onClick={() => setActiveTab('music')} />
                        </nav>

                        <div className="mt-auto space-y-4">
                            <div className="p-4 rounded-2xl bg-white/5 border border-white/5">
                                <p className="text-[10px] text-gray-500 font-bold uppercase mb-3 block text-center">Engine Aktif</p>
                                <div className="flex p-1 bg-black rounded-xl">
                                    <button onClick={() => setSelectedEngine('gemini')} className={`flex-1 py-2 rounded-lg text-[10px] font-bold transition-all ${selectedEngine === 'gemini' ? 'bg-indigo-600 shadow-lg' : 'text-gray-500'}`}>GEMINI</button>
                                    <button onClick={() => setSelectedEngine('groq')} className={`flex-1 py-2 rounded-lg text-[10px] font-bold transition-all ${selectedEngine === 'groq' ? 'bg-orange-600 shadow-lg' : 'text-gray-500'}`}>GROQ</button>
                                </div>
                            </div>
                            <div className="flex items-center space-x-3 p-3 rounded-2xl bg-indigo-600/10 border border-indigo-600/20">
                                <div className="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-xs font-bold">V</div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs font-bold truncate">Premium User</p>
                                    <p className="text-[10px] text-indigo-400">Pro Plan Active</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative overflow-hidden">
                        {/* Background Decor */}
                        <div className="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-indigo-600/10 blur-[120px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-purple-600/10 blur-[120px] rounded-full"></div>

                        <header className="h-20 glass border-b border-white/5 flex items-center justify-between px-10 z-10">
                            <div className="flex items-center space-x-3">
                                <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                                <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">Sistem Operasi AI Berjalan</span>
                            </div>
                            <div className="flex items-center space-x-6">
                                <button className="text-gray-400 hover:text-white transition-colors"><LucideIcon name="bell" size={18} /></button>
                                <button className="text-gray-400 hover:text-white transition-colors"><LucideIcon name="settings" size={18} /></button>
                                <div className="h-8 w-px bg-white/10 mx-2"></div>
                                <button className="bg-white text-black text-xs font-bold px-4 py-2 rounded-full hover:bg-indigo-500 hover:text-white transition-all">Hubungkan API</button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto custom-scrollbar p-10 z-10">
                            {activeTab === 'dashboard' ? (
                                <div className="space-y-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                    <div className="max-w-3xl">
                                        <h1 className="text-6xl font-black tracking-tighter mb-4 leading-[1.1]">Ruang <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500">Inovasi Tanpa Batas</span></h1>
                                        <p className="text-gray-400 text-lg leading-relaxed">Selamat datang kembali. Akses berbagai model kecerdasan buatan terkuat di dunia melalui satu antarmuka yang elegan.</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <StatsCard label="Kredit Tersedia" value="1,240 Pts" icon="credit-card" color="text-indigo-400" />
                                        <StatsCard label="Proyek Selesai" value="48" icon="check-circle" color="text-green-400" />
                                        <StatsCard label="Model Terintegrasi" value="12" icon="cpu" color="text-purple-400" />
                                        <StatsCard label="Response Time" value="1.2s" icon="zap" color="text-yellow-400" />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        <FeatureCard title="Text Generation" desc="Tulis konten blog, naskah video, hingga kode pemrograman kompleks." icon="type" color="bg-blue-600" onClick={() => setActiveTab('text')} />
                                        <FeatureCard title="Visual Art" desc="Ubah teks menjadi gambar fotorealistik berkualitas tinggi." icon="image" color="bg-purple-600" onClick={() => setActiveTab('image')} />
                                        <FeatureCard title="Video Motion" desc="Hasilkan animasi pendek dan transisi video sinematik." icon="video" color="bg-orange-600" onClick={() => setActiveTab('video')} />
                                    </div>
                                </div>
                            ) : (
                                <div className="max-w-4xl mx-auto space-y-8 animate-in zoom-in-95 duration-500">
                                    <div className="flex items-end justify-between border-b border-white/5 pb-6">
                                        <div>
                                            <h2 className="text-4xl font-black tracking-tight capitalize">AI {activeTab}</h2>
                                            <p className="text-gray-500 mt-2">Ditenagai oleh {selectedEngine === 'gemini' ? 'Google Gemini 1.5 Flash' : 'Meta Llama 3'}</p>
                                        </div>
                                        <div className="bg-indigo-600/10 px-4 py-2 rounded-xl border border-indigo-600/20 flex items-center space-x-2">
                                            <LucideIcon name="shield-check" className="text-indigo-500" size={14} />
                                            <span className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Aman & Terenkripsi</span>
                                        </div>
                                    </div>

                                    <div className="neon-border bg-[#0d0d0f] rounded-[2.5rem] p-2">
                                        <div className="bg-[#08080a] rounded-[2.2rem] p-8">
                                            <textarea 
                                                value={prompt}
                                                onChange={(e) => setPrompt(e.target.value)}
                                                placeholder="Deskripsikan apa yang ingin Anda buat hari ini..."
                                                className="w-full bg-transparent border-none focus:ring-0 text-xl h-48 resize-none placeholder-gray-800 font-medium"
                                            />
                                            <div className="flex items-center justify-between mt-6 pt-6 border-t border-white/5">
                                                <div className="flex space-x-2">
                                                    <ToolButton icon="paperclip" />
                                                    <ToolButton icon="image" />
                                                    <ToolButton icon="mic" />
                                                </div>
                                                <button 
                                                    onClick={handleGenerate}
                                                    disabled={loading || !prompt.trim()}
                                                    className={`px-10 py-4 rounded-2xl font-black text-sm uppercase tracking-widest transition-all flex items-center space-x-3 ${loading ? 'bg-gray-800 text-gray-500' : 'bg-indigo-600 hover:bg-indigo-500 shadow-xl shadow-indigo-600/20 active:scale-95'}`}
                                                >
                                                    {loading ? <LucideIcon name="loader-2" className="animate-spin" /> : <LucideIcon name="send" />}
                                                    <span>{loading ? 'AI Memproses...' : 'Eksekusi Perintah'}</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    {result && (
                                        <div className={`glass rounded-[2.5rem] p-10 space-y-6 border ${result.isError ? 'border-red-500/30' : 'border-indigo-500/20'} animate-in slide-in-from-top-4`}>
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center space-x-3">
                                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${result.isError ? 'bg-red-500/10 text-red-500' : 'bg-indigo-500/10 text-indigo-400'}`}>
                                                        <LucideIcon name={result.isError ? "alert-triangle" : "sparkles"} size={16} />
                                                    </div>
                                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-widest">Hasil Generasi</span>
                                                </div>
                                                <button onClick={() => navigator.clipboard.writeText(result.text)} className="p-2 hover:bg-white/5 rounded-lg text-gray-500 hover:text-white transition-all"><LucideIcon name="copy" size={16} /></button>
                                            </div>
                                            <div className={`leading-relaxed text-lg whitespace-pre-wrap ${result.isError ? 'text-red-400 font-mono text-sm' : 'text-gray-300'}`}>
                                                {result.text}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const SidebarItem = ({ icon, label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center space-x-4 p-4 rounded-2xl transition-all font-medium text-sm ${active ? 'sidebar-active shadow-inner' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}
            >
                <LucideIcon name={icon} size={18} />
                <span>{label}</span>
            </button>
        );

        const StatsCard = ({ label, value, icon, color }) => (
            <div className="glass p-5 rounded-2xl border border-white/5 group hover:border-white/10 transition-all">
                <div className="flex items-center justify-between mb-3">
                    <div className={`p-2 rounded-lg bg-white/5 ${color}`}><LucideIcon name={icon} size={16} /></div>
                    <LucideIcon name="trending-up" className="text-green-500/50" size={14} />
                </div>
                <p className="text-[10px] font-bold text-gray-500 uppercase mb-1">{label}</p>
                <p className="text-2xl font-black tracking-tight">{value}</p>
            </div>
        );

        const FeatureCard = ({ title, desc, icon, color, onClick }) => (
            <div onClick={onClick} className="glass p-8 rounded-[2rem] border border-white/5 group hover:border-indigo-500/50 transition-all cursor-pointer relative overflow-hidden h-full">
                <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity"><LucideIcon name={icon} size={120} /></div>
                <div className={`${color} w-14 h-14 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-black/50 group-hover:scale-110 transition-transform`}>
                    <LucideIcon name={icon} className="text-white" size={28} />
                </div>
                <h3 className="text-2xl font-black mb-3 tracking-tight">{title}</h3>
                <p className="text-gray-500 text-sm leading-relaxed">{desc}</p>
                <div className="mt-8 flex items-center text-indigo-500 font-bold text-xs uppercase tracking-widest group-hover:translate-x-2 transition-transform">
                    Mulai Sekarang <LucideIcon name="chevron-right" size={14} className="ml-2" />
                </div>
            </div>
        );

        const ToolButton = ({ icon }) => (
            <button className="p-3 bg-white/5 rounded-xl text-gray-500 hover:bg-white/10 hover:text-white transition-all"><LucideIcon name={icon} size={18} /></button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
